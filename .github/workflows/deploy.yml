name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: danilairo/danilairo.space:latest

      # === Копируем docker-compose.yaml на сервер ===
      - name: Copy docker-compose.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.LINUX_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/srv/danilairo.space"
          strip_components: 0

      # === Деплой на сервер ===
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.LINUX_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |
            cd /srv/danilairo.space

            echo "=== Pulling latest image ==="
            sudo docker pull danilairo/danilairo.space:latest

            echo "=== Starting containers ==="
            sudo docker compose -f docker-compose.yaml up -d --pull=always --force-recreate

            echo "=== Deployment completed successfully ==="
            sudo docker compose -f docker-compose.yaml ps