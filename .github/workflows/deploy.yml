name: Build and Deploy

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ secrets.DOCKER_IMAGE }}:latest

      # === Копируем docker-compose.yaml на сервер ===
      - name: Copy docker-compose.yaml to server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.LINUX_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          source: "docker-compose.yaml"
          target: "/srv/${{ secrets.DOMAIN }}"
          strip_components: 0

      # === Деплой на сервер с передачей переменных среды ===
      - name: Deploy to server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.LINUX_USERNAME }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          timeout: 30s
          command_timeout: 10m
          script: |
            set -e

            # === Экспорт переменных среды из GitHub Secrets ===
            export DOCKER_IMAGE="${{ secrets.DOCKER_IMAGE }}"
            export CONTAINER_PORT="${{ secrets.CONTAINER_PORT }}"
            export DOMAIN="${{ secrets.DOMAIN }}"
            export EMAIL="${{ secrets.EMAIL }}"

            # === Создаём директории для Nginx и Certbot ===
            sudo mkdir -p /etc/nginx/conf.d
            sudo mkdir -p /etc/letsencrypt
            sudo mkdir -p /var/www/html

            # === Настройка Nginx (HTTP -> HTTPS, proxy_pass к контейнеру) ===
            sudo tee /etc/nginx/conf.d/${DOMAIN}.conf > /dev/null <<'EOF'
server {
    listen 80;
    server_name ${DOMAIN} www.${DOMAIN};

    root /var/www/html;
    index index.html;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    server_name ${DOMAIN} www.${DOMAIN};

    ssl_certificate /etc/letsencrypt/live/${DOMAIN}/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/${DOMAIN}/privkey.pem;

    location / {
        proxy_pass http://127.0.0.1:${CONTAINER_PORT};
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
EOF

            # === Проверяем наличие сертификата ===
            if [ ! -d /etc/letsencrypt/live/${DOMAIN} ]; then
              echo "=== First-time SSL setup with Certbot ==="
              sudo certbot certonly --webroot -w /var/www/html \
                -d ${DOMAIN} -d www.${DOMAIN} \
                --email ${EMAIL} --agree-tos --non-interactive
            fi

            # === Перезапуск Nginx для применения сертификата ===
            sudo nginx -t
            sudo systemctl restart nginx || sudo service nginx restart

            # === Запуск Docker контейнера ===
            cd /srv/${DOMAIN}
            echo "=== Pulling latest image ==="
            sudo docker pull ${DOCKER_IMAGE}:latest

            echo "=== Starting containers ==="
            sudo docker compose -f docker-compose.yaml up -d --pull=always --force-recreate

            echo "=== Deployment completed successfully ==="
            sudo docker compose -f docker-compose.yaml ps