version: "3.9"

services:

  traefik:
    image: traefik:v3.6
    command:
      - --providers.docker=true

      # entrypoints
      - --entrypoints.web.address=:80
      - --entrypoints.websecure.address=:443

      # ACME
      - --certificatesresolvers.le.acme.email=admin@danilairo.space
      - --certificatesresolvers.le.acme.storage=/letsencrypt/acme.json
      - --certificatesresolvers.le.acme.httpchallenge=true
      - --certificatesresolvers.le.acme.httpchallenge.entrypoint=web

      # (очень помогает при дебаге)
      - --log.level=DEBUG

    ports:
      - "80:80"
      - "443:443"

    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./letsencrypt:/letsencrypt

  site:
    image: danilairo/danilairo.space:latest

    labels:
      - "traefik.enable=true"

      # === HTTP (обязательно для ACME) ===
      - "traefik.http.routers.site-http.rule=Host(`danilairo.space`) || Host(`www.danilairo.space`)"
      - "traefik.http.routers.site-http.entrypoints=web"

      # === HTTPS ===
      - "traefik.http.routers.site.rule=Host(`danilairo.space`) || Host(`www.danilairo.space`)"
      - "traefik.http.routers.site.entrypoints=websecure"
      - "traefik.http.routers.site.tls.certresolver=le"

      # === сервис ===
      - "traefik.http.services.site.loadbalancer.server.port=8080"